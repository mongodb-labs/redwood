<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>redwood</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="options.js"></script>
</head>
<body class="p-300 font-body text-light-text-primary bg-light-background-primary">
    <main>
        <p class="m-0 mb-200 text-small text-light-text-primary opacity-80">CDN environment is chosen from the toolbar popup.</p>
        <label class="flex items-center mb-150">
            <span class="inline-block font-semibold text-small min-w-[120px] pr-300 text-right">Replace URL prefix</span>
            <input class="w-[210px] px-200 py-100 text-base rounded-100 border border-light-border-primary bg-light-background-primary text-light-text-primary" name="replace">
        </label>
        <label class="flex items-center mb-150">
            <span class="inline-block font-semibold text-small min-w-[120px] pr-300 text-right">Webpack Dev Server?</span>
            <input name="wds">
        </label>
        <label class="flex items-center mb-150">
            <span class="inline-block font-semibold text-small min-w-[120px] pr-300 text-right">Web Server Port (if using wds)</span>
            <input class="w-[210px] px-200 py-100 text-base rounded-100 border border-light-border-primary bg-light-background-primary text-light-text-primary" name="webServerPort">
        </label>
        <label class="flex items-center mb-150">
            <span class="inline-block font-semibold text-small min-w-[120px] pr-300 text-right">Compressed?</span>
            <input name="compressed">
        </label>
        <footer class="mt-600 text-center">
            <button class="cursor-pointer px-400 py-100 text-small rounded-100 bg-blue-base text-white hover:bg-blue-dark1" name="save">Save</button>
        </footer>
    </main>
</body>
</html>
