<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>redwood</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="options.js"></script>
</head>
<body class="p-300 font-body text-light-text-primary bg-light-background-primary">
    <main class="w-[500px]">
        <p class="m-0 mb-600 text-base text-light-text-primary opacity-80">CDN environment is chosen from the toolbar popup.</p>
        <label class="flex items-center mb-300">
            <span class="inline-block font-semibold text-base w-[180px] mr-[40px]">Replace URL prefix</span>
            <input class="w-[300px] px-300 py-100 text-base rounded-100 border border-light-border-primary bg-light-background-primary text-light-text-primary" name="replace">
        </label>
        <label class="flex items-center mb-300">
            <span class="inline-block font-semibold text-base w-[180px] mr-[40px]">Webpack Dev Server?</span>
            <input class="w-[300px] px-300 py-100 text-base rounded-100 border border-light-border-primary bg-light-background-primary text-light-text-primary" name="wds">
        </label>
        <label class="flex items-center mb-300">
            <span class="inline-block font-semibold text-base w-[180px] mr-[40px]">Web Server Port (if using wds)</span>
            <input class="w-[300px] px-300 py-100 text-base rounded-100 border border-light-border-primary bg-light-background-primary text-light-text-primary" name="webServerPort">
        </label>
        <label class="flex items-center mb-300">
            <span class="inline-block font-semibold text-base w-[180px] mr-[40px]">Compressed?</span>
            <input class="w-[300px] px-300 py-100 text-base rounded-100 border border-light-border-primary bg-light-background-primary text-light-text-primary" name="compressed">
        </label>
        <footer class="mt-600 text-center">
             <button class="cursor-pointer px-[32px] py-[12px] text-base rounded-100 text-white hover:bg-green-dark2" style="background-color: #00684a" name="save">Save</button>
        </footer>
    </main>
</body>
</html>
