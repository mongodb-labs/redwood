<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redwood</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="popup.js"></script>
</head>
<body class="p-0">
    <div class="bg-dark-background-primary font-body">
        <h1 class="js-heading m-0 px-300 py-200 text-heading4 font-semibold text-dark-text-primary bg-gray-dark2 data-[active]:bg-green-dark2" data-active>▶️ Redwood is running</h1>
        <main class="p-300 min-w-[300px]">
            <div class="mt-300 flex items-center">
                <span class="text-base text-dark-text-primary font-semibold">Enable</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-switch">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            
            <label class="mb-200 block text-base text-dark-text-primary">
                <span class="mb-100 block font-semibold">Environment</span>
                 <select id="env-select" class="w-[300px] px-200 py-100 text-small rounded-100 font-monospace text-dark-text-primary bg-gray-dark2"></select>
            </label>
            <label class="mb-200 block text-base text-dark-text-primary" id="custom-url-container" style="display: none;">
                <span class="mb-100 block font-semibold">Custom URL</span>
                <input type="text" id="custom-url-input" placeholder="https://assets.example.com/mms" class="w-[300px] px-200 py-100 text-small rounded-100 font-monospace text-dark-text-primary bg-gray-dark2 border border-gray-dark1" />
            </label>
            <p class="text-base text-dark-text-primary font-semibold">Matching requests from <br /><var class="js-match font-monospace text-small text-dark-text-primary"></var></p>
            <p class="text-base text-dark-text-primary font-semibold">and replacing with <br /><var class="js-replace font-monospace text-small text-dark-text-primary"></var></p>
            
        </main>
    </div>
</body>
</html>
