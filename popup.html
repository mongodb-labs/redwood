<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redwood</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="popup.js"></script>
</head>
<body class="p-0">
    <div class="bg-dark-background-primary font-body">
        <h1 class="js-heading m-0 px-300 py-200 text-heading4 font-semibold text-dark-text-primary bg-gray-dark2 data-[active]:bg-dark-background-success" data-active>▶️ Redwood is running</h1>
        <main class="p-300 min-w-[300px]">
            <div class="popup-row">
                <span class="popup-label">Enable</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-switch">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div class="popup-row">
                <span class="popup-label">Environment</span>
                <select id="env-select" class="w-[300px] px-200 py-100 rounded-100 font-monospace text-dark-text-primary bg-gray-dark2"></select>
            </div>
            <div class="popup-row hidden" id="custom-url-container">
                <span class="popup-label">Custom URL</span>
                <input type="text" id="custom-url-input" placeholder="https://assets.example.com/mms" class="w-[300px] px-200 py-100 rounded-100 font-monospace text-dark-text-primary bg-gray-dark2 border border-gray-dark1" />
            </div>

            <hr class="divider"/>

            <p class="text-dark-text-primary">Matching requests from <br /><var class="js-match font-monospace text-small text-dark-text-primary"></var></p>
            <p class="text-dark-text-primary" style="margin-top: 8px;">and replacing with <br /><var class="js-replace font-monospace text-small text-dark-text-primary"></var></p>

            <hr class="divider hidden" id="server-status-divider"/>
            <p id="popup-server-status" class="popup-text"></p>
        </main>
    </div>
</body>
</html>
